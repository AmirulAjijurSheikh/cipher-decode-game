<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cipher Decode Game</title>
  <style>
    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0a1a;
      color: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== WELCOME SCREEN ===== */
    .screen {
      display: none;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 100vh;
      padding: 2rem;
    }

    /* ===== TITLE ===== */
    .game-title {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .game-subtitle {
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 3rem;
      text-align: center;
    }

    /* ===== CARD ===== */
    .card {
      background: #1e1e2e;
      border: 1px solid #2e2e4e;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }

    .card h2 {
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
      color: #e2e8f0;
      text-align: center;
    }

    /* ===== FORM ===== */
    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #0a0a1a;
      border: 1px solid #2e2e4e;
      border-radius: 8px;
      color: #ffffff;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    .form-group input:focus {
      border-color: #a78bfa;
    }

    /* ===== BUTTON ===== */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0px);
    }

    /* ===== RANK BADGE ===== */
    .rank-badge {
      margin-top: 2rem;
      padding: 10px 20px;
      background: #1e1e2e;
      border: 1px solid #2e2e4e;
      border-radius: 999px;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .rank-badge span {
      color: #a78bfa;
      font-weight: 600;
    }

  </style>
</head>
<body>

  <!-- WELCOME SCREEN -->
  <div class="screen active" id="welcome-screen">
    <h1 class="game-title">🔐 Cipher Decode</h1>
    <p class="game-subtitle">Decode the twisted letters. Train your mind.</p>

    <div class="card">
      <h2>Tell us about yourself</h2>

      <div class="form-group">
        <label for="player-name">Your Name</label>
        <input type="text" id="player-name" placeholder="e.g. Amirul" />
      </div>

      <div class="form-group">
        <label for="player-age">Your Age</label>
        <input type="number" id="player-age" placeholder="e.g. 18" min="5" max="99" />
      </div>

      <button class="btn-primary" onclick="startGame()">
        Start Decoding →
      </button>
    </div>

    <div class="rank-badge">
      Current Rank: <span>🔰 Rookie Decoder</span>
    </div>
  </div>

  <script>
    // This function runs when the player clicks "Start Decoding"
    function startGame() {
      const name = document.getElementById('player-name').value.trim();
      const age = document.getElementById('player-age').value.trim();

      // Check if both fields are filled
      if (!name || !age) {
        alert('Please enter your name and age!');
        return;
      }

      // Save player info (we'll use this later to personalize AI sentences)
      localStorage.setItem('playerName', name);
      localStorage.setItem('playerAge', age);

      // For now just confirm it works
      alert(`Welcome, ${name}! Let the decoding begin! 🔐`);
    }
  </script>

</body>
</html>
